server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name api.manitobarydercup.com;

    ssl_certificate /etc/letsencrypt/live/manitobarydercup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manitobarydercup.com/privkey.pem;

    # Use Docker's internal DNS so upstream IPs are re-resolved after container restarts
    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream http://heimdall:5000;
        proxy_pass $upstream;
    }

    location /scorecard {
        set $upstream http://scorecard:5000;
        proxy_pass $upstream;
    }
}
